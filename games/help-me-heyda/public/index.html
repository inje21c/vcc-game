<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>도와줘 헤이다</title>
    <link rel="stylesheet" href="../src/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="game-area view-intro" aria-label="도와줘 헤이다 게임 화면">
        <button class="intro-screen" id="introScreen" data-action="start" aria-label="타이틀 화면, 터치하면 메뉴로 이동">
          <img src="legacy/img/title.png" alt="도와줘 헤이다 타이틀">
        </button>

        <div class="main-menu" id="mainMenu" aria-label="메인 메뉴">
          <div class="dial-menu">
            <img class="dial-title" src="legacy/img/title.png" alt="도와줘 헤이다">
            <button class="dial-item story-item" data-action="open-story" aria-label="스토리모드">
              <img src="legacy/img/hero0.png" alt="">
              <span>스토리</span>
            </button>
            <button class="dial-item survival-item" data-action="start-survival" aria-label="서바이벌모드">
              <img src="legacy/img/s_hero0.png" alt="">
              <span>서바이벌</span>
            </button>
            <button class="dial-item help-item" data-action="show-help" aria-label="도움말">
              <img src="legacy/img/feather.png" alt="">
              <span>도움말</span>
            </button>
            <button class="dial-item option-item" data-action="show-options" aria-label="옵션">
              <img src="legacy/img/stone.png" alt="">
              <span>옵션</span>
            </button>
            <button class="dial-item rank-item" data-action="show-ranking" aria-label="랭킹 준비중">
              <img src="legacy/img/combo.png" alt="">
              <span>랭킹</span>
            </button>
          </div>
        </div>

        <div class="story-screen" id="storyScreen" aria-live="polite">
          <p class="eyebrow" id="storyEpisode">EPISODE 1</p>
          <h2 id="storyTitle">수목족의 위기</h2>
          <p id="storyText"></p>
          <div class="story-actions">
            <button data-action="back-menu">메뉴</button>
            <button class="primary-action" data-action="next-story" id="storyNext">다음</button>
          </div>
        </div>

        <div class="info-screen" id="infoScreen" aria-live="polite">
          <p class="eyebrow" id="infoEyebrow">HELP</p>
          <h2 id="infoTitle">도움말</h2>
          <p id="infoText"></p>
          <button data-action="back-menu">메뉴</button>
        </div>

        <div class="top-bar game-ui">
          <div>
            <p class="eyebrow">MobileAge 2003</p>
            <h1>도와줘 헤이다</h1>
          </div>
          <button class="icon-button" data-action="pause" aria-label="일시정지">Ⅱ</button>
        </div>

        <div class="screen-wrap game-ui">
          <canvas id="game" width="120" height="132" aria-label="게임 캔버스"></canvas>
        </div>

        <div class="status-strip game-ui" aria-live="polite">
          <span id="modeLabel">LOADING</span>
          <span id="stageLabel">STAGE 1</span>
          <span id="scoreLabel">SCORE 0</span>
        </div>

        <div class="touch-pad game-ui" aria-label="게임 조작">
          <div class="row-select" id="rowSelect"></div>
          <div class="actions">
            <button data-action="up" aria-label="위">▲</button>
            <button data-action="push" class="primary-action" aria-label="밀기">밀기</button>
            <button data-action="down" aria-label="아래">▼</button>
            <button data-action="skill" aria-label="스킬">스킬</button>
          </div>
        </div>

        <div class="menu-actions game-ui">
          <button data-action="back-menu">메뉴</button>
          <button data-action="story">스토리 재시작</button>
          <button data-action="survival">서바이벌</button>
        </div>
      </section>
    </main>
    <script type="module" src="../src/app.js"></script>
  </body>
</html>

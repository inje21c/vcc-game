<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#050807">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="도와줘 헤이다 2026">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="assets/title-2026-source.png">
    <title>도와줘 헤이다 2026</title>
    <link rel="stylesheet" href="../src/styles.css">
  </head>
  <body>
    <main class="app" aria-label="도와줘 헤이다 2026">
      <canvas id="scene" aria-label="게임 화면"></canvas>
      <a
        class="report-link"
        href="https://github.com/vibecoding001/vcc-game/issues/new?template=beta-game-report.yml"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="베타 오류 보고"
      >Report</a>

      <section class="screen intro is-active" data-screen="intro">
        <button class="title-mark" data-action="open-menu" aria-label="메인 메뉴로 이동">
          <img src="assets/title-2026-source.png" alt="도와줘 헤이다">
        </button>
      </section>

      <section class="screen menu" data-screen="menu">
        <div class="menu-art" aria-label="메인 메뉴">
          <img src="assets/ChatGPT Image 2026년 5월 22일 오후 12_00_32.png" alt="">
          <button class="menu-hotspot story" data-action="story" aria-label="스토리모드"></button>
          <button class="menu-hotspot survival" data-action="survival" aria-label="서바이벌모드"></button>
          <button class="menu-hotspot help" data-action="help" aria-label="도움말"></button>
          <button class="menu-hotspot option" data-action="option" aria-label="설정"></button>
        </div>
      </section>

      <section class="screen story-screen" data-screen="story">
        <figure class="story-cut">
          <img id="chapterImage" src="assets/story1.png" alt="">
        </figure>
        <div class="chapter-kicker" id="chapterKicker">Chapter 1</div>
        <h1 id="chapterTitle">숲의 심장</h1>
        <p id="chapterText"></p>
        <div class="story-actions">
          <button data-action="open-menu" aria-label="메인 메뉴로 돌아가기">Menu</button>
          <button data-action="prev-chapter" aria-label="이전 이야기">Prev</button>
          <button data-action="skip-story" aria-label="이야기 건너뛰고 게임 시작">Skip</button>
          <button class="primary-button" data-action="next-chapter">Next</button>
        </div>
      </section>

      <section class="screen help-screen" data-screen="help">
        <h1>도움말</h1>
        <p>원작처럼 헤이다가 선택한 행의 첫 토템을 밀어 바닥 줄에 모은다. 같은 문양을 정확히 맞추면 콤보가 이어진다.</p>
        <button class="primary-button" data-action="open-menu">Menu</button>
      </section>

      <section class="screen settings-screen" data-screen="settings">
        <h1>설정</h1>
        <p>미션 모드는 개발 중입니다. 현재는 스테이지와 결과 화면을 빠르게 확인하는 테스트 진입점으로 사용합니다.</p>
        <div class="settings-grid">
          <button data-action="dev-stage-1">Stage 1</button>
          <button data-action="dev-stage-6">Stage 6</button>
          <button data-action="dev-stage-12">Stage 12</button>
          <button data-action="dev-stage-18">Stage 18</button>
          <button data-action="dev-clear">Clear Test</button>
          <button data-action="dev-gameover">Game Over</button>
        </div>
        <button class="primary-button" data-action="open-menu">Menu</button>
      </section>

      <section class="screen pause-screen" data-screen="pause">
        <h1>Paused</h1>
        <p>잠시 멈췄습니다. 이어하기를 누르면 3초 뒤 다시 시작합니다.</p>
        <div class="pause-actions">
          <button class="primary-button" data-action="resume-play">Play</button>
          <button data-action="open-menu">Menu</button>
        </div>
      </section>

      <section class="hud" data-screen="play">
        <div>
          <span>Time</span>
          <b id="timeLabel">900</b>
        </div>
        <div>
          <span>Score</span>
          <b id="scoreLabel">0</b>
        </div>
        <div>
          <span>Combo</span>
          <b id="comboLabel">0</b>
        </div>
      </section>

      <section class="play-actions" aria-label="게임 조작">
        <button data-action="pause-play" aria-label="잠시 멈춤">Pause</button>
        <button data-action="open-menu" aria-label="메인 메뉴로 이동">Menu</button>
      </section>
    </main>

    <script src="../src/game2026.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
      }
    </script>
  </body>
</html>

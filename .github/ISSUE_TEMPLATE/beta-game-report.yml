name: 베타 오류/개선 제보
description: 게임하다가 불편하거나 이상한 점을 간단히 남겨주세요
title: "[Beta] "
labels:
  - beta
body:
  - type: markdown
    attributes:
      value: |
        어렵게 쓰지 않아도 됩니다. 기억나는 만큼만 적어주세요.
  - type: dropdown
    id: type
    attributes:
      label: 어떤 제보인가요?
      options:
        - 오류가 있어요
        - 불편해요
        - 개선 아이디어가 있어요
        - 잘 모르겠지만 이상해요
    validations:
      required: true
  - type: input
    id: where
    attributes:
      label: 어디에서 그랬나요?
      placeholder: "예: 타이틀, 메뉴, 스토리, Stage 1, 서바이벌"
    validations:
      required: true
  - type: textarea
    id: what_happened
    attributes:
      label: 무슨 일이 있었나요?
      placeholder: |
        예: 스토리 화면에서 메뉴로 돌아갈 수 없어서 불편했습니다.
        예: Stage 1에서 블록을 밀었는데 화면이 멈췄습니다.
    validations:
      required: true
  - type: textarea
    id: wanted
    attributes:
      label: 어떻게 바뀌면 좋을까요?
      placeholder: "예: 스토리 화면에 Menu와 Skip 버튼이 있으면 좋겠습니다."
  - type: input
    id: device
    attributes:
      label: 사용한 기기/브라우저
      placeholder: "예: 아이폰 Safari, 갤럭시 Chrome, 맥북 Chrome"
  - type: input
    id: url
    attributes:
      label: 플레이한 주소
      placeholder: "Vercel 게임 URL"
  - type: textarea
    id: screenshot
    attributes:
      label: 스크린샷이 있으면 첨부해주세요
      description: 없어도 괜찮습니다.

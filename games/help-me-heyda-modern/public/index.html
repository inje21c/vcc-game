<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#050807">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="도와줘 헤이다 2026">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="assets/title-2026-source.png">
    <title>도와줘 헤이다 2026</title>
    <link rel="stylesheet" href="../src/styles.css">
  </head>
  <body>
    <main class="app" aria-label="도와줘 헤이다 2026">
      <canvas id="scene" aria-label="게임 화면"></canvas>

      <section class="screen intro is-active" data-screen="intro">
        <button class="title-mark" data-action="open-menu" aria-label="메인 메뉴로 이동">
          <img src="assets/title-2026-source.png" alt="도와줘 헤이다">
        </button>
      </section>

      <section class="screen menu" data-screen="menu">
        <div class="menu-art" aria-label="메인 메뉴">
          <img src="assets/ChatGPT Image 2026년 5월 22일 오후 12_00_32.png" alt="">
          <button class="menu-hotspot story" data-action="story" aria-label="스토리모드"></button>
          <button class="menu-hotspot survival" data-action="survival" aria-label="서바이벌모드"></button>
          <button class="menu-hotspot help" data-action="help" aria-label="도움말"></button>
          <button class="menu-hotspot option" data-action="option" aria-label="설정"></button>
        </div>
      </section>

      <section class="screen story-screen" data-screen="story">
        <figure class="story-cut">
          <img id="chapterImage" src="assets/story1.png" alt="">
        </figure>
        <div class="chapter-kicker" id="chapterKicker">Chapter 1</div>
        <h1 id="chapterTitle">숲의 심장</h1>
        <p id="chapterText"></p>
        <div class="story-actions">
          <button data-action="prev-chapter" aria-label="이전 이야기">Prev</button>
          <button class="primary-button" data-action="next-chapter">Next</button>
        </div>
      </section>

      <section class="screen help-screen" data-screen="help">
        <h1>도움말</h1>
        <p>원작처럼 헤이다가 선택한 행의 첫 토템을 밀어 바닥 줄에 모은다. 같은 문양을 정확히 맞추면 콤보가 이어진다.</p>
        <button class="primary-button" data-action="open-menu">Menu</button>
      </section>

      <section class="hud" data-screen="play">
        <div>
          <span>Time</span>
          <b id="timeLabel">900</b>
        </div>
        <div>
          <span>Score</span>
          <b id="scoreLabel">0</b>
        </div>
        <div>
          <span>Combo</span>
          <b id="comboLabel">0</b>
        </div>
      </section>
    </main>

    <script src="../src/game2026.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
      }
    </script>
  </body>
</html>
